<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Highlands NC Waterfall Checklist</title>
  <desc id="desc">A forest green social preview thumbnail for a Highlands, North Carolina waterfall checklist app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173321"/>
      <stop offset="0.52" stop-color="#2f5f3e"/>
      <stop offset="1" stop-color="#10291b"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="35%" r="52%">
      <stop offset="0" stop-color="#d8e8d1" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#d8e8d1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#07170e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g opacity="0.15" stroke="#f6efd8" stroke-width="2" fill="none">
    <path d="M0 95 C120 70 200 125 325 95 S520 60 640 94 845 130 980 95 1090 70 1200 92"/>
    <path d="M0 160 C130 135 220 190 350 160 S540 125 670 158 880 194 1010 160 1110 138 1200 155"/>
    <path d="M0 470 C150 440 260 500 395 468 S620 430 760 468 965 505 1100 468 1155 448 1200 460"/>
  </g>

  <g transform="translate(655 92)" filter="url(#shadow)">
    <rect x="0" y="0" width="390" height="450" rx="34" fill="#f8f3df" opacity="0.96"/>
    <rect x="28" y="28" width="334" height="394" rx="24" fill="none" stroke="#d5b876" stroke-width="5"/>
    <rect x="48" y="52" width="294" height="52" rx="26" fill="#e8efe2"/>
    <text x="195" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#27462f">WATERFALL PASS</text>

    <g transform="translate(195 205)">
      <circle r="82" fill="#183522"/>
      <circle r="70" fill="none" stroke="#d5b876" stroke-width="6"/>
      <circle r="49" fill="#f8f3df"/>
      <path d="M-48 28 L-18 -22 L-1 6 L25 -32 L55 28" fill="none" stroke="#27462f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-9 -18 C-17 28 -14 50 -18 62 M3 -22 C2 20 4 43 2 64 M15 -18 C22 20 21 42 25 62" stroke="#7da082" stroke-width="6" stroke-linecap="round"/>
      <path d="M-42 52 H42" stroke="#27462f" stroke-width="7" stroke-linecap="round"/>
    </g>

    <g transform="translate(63 335)">
      <rect width="264" height="28" rx="14" fill="#e8efe2"/>
      <rect width="161" height="28" rx="14" fill="#48724d"/>
      <text x="132" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#27462f">Track your waterfall adventures</text>
    </g>
  </g>

  <g transform="translate(92 112)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" letter-spacing="4" fill="#d5b876">HIGHLANDS, NC</text>
    <text x="0" y="86" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" fill="#f8f3df">Waterfall</text>
    <text x="0" y="165" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" fill="#f8f3df">Checklist</text>
    <text x="2" y="226" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#dce8d7">Check off falls, save notes, sort your route,</text>
    <text x="2" y="267" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#dce8d7">open Apple Maps, and export a passport PDF.</text>

    <g transform="translate(0 345)">
      <rect x="0" y="0" width="168" height="54" rx="27" fill="#f8f3df"/>
      <text x="84" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#27462f">12 FALLS</text>
      <rect x="188" y="0" width="198" height="54" rx="27" fill="#d5b876"/>
      <text x="287" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="#183522">PASSPORT PDF</text>
    </g>
  </g>
